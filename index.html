<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calendário do Salão do Reino</title>
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
  
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background-color: #f4f4f9;}
    #calendar { max-width: 900px; margin: 0 auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1);}
    
    /* Estilo da Janelinha de Pedido (Modal) */
    #modal-reserva {
      display: none; /* Começa escondido */
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: white; padding: 20px; border-radius: 8px;
      box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 1000; width: 300px;
    }
    #modal-reserva input, #modal-reserva select { width: 100%; margin-bottom: 10px; padding: 8px; box-sizing: border-box; }
    .btn { padding: 10px; border: none; border-radius: 5px; cursor: pointer; width: 100%; margin-bottom: 5px;}
    .btn-salvar { background: #28a745; color: white; }
    .btn-fechar { background: #dc3545; color: white; }
  </style>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var calendarEl = document.getElementById('calendar');
      
      // COLOQUE O SEU NOVO LINK DO APPS SCRIPT AQUI
      var googleAppsScriptUrl = 'https://script.google.com/macros/s/AKfycbxCop7u19B6jb_da89_VkxQtbqDp5jYXALtCD8RZ4M1dA1tummLfUjJDUOYiQ8CLW4vCw/exec';

      var calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        locale: 'pt-br',
        headerToolbar: {
          left: 'prev,next today',
          center: 'title',
          right: 'dayGridMonth,listWeek'
        },
        events: googleAppsScriptUrl,
        
        // ISSO PERMITE CLICAR NAS DATAS!
        selectable: true, 
        select: function(info) {
          // Preenche o campo de data automaticamente com o dia clicado
          document.getElementById('data-escolhida').value = info.startStr;
          // Mostra a janelinha de pedido
          document.getElementById('modal-reserva').style.display = 'block';
        }
      });
      
      calendar.render();
    });

    // Função para fechar a janelinha
    function fecharModal() {
      document.getElementById('modal-reserva').style.display = 'none';
    }

    // Função que será chamada ao clicar em Enviar Pedido
// Função que será chamada ao clicar em Enviar Pedido
    function enviarPedido() {
      var titulo = document.getElementById('titulo-reserva').value;
      var data = document.getElementById('data-escolhida').value;
      var congregacao = document.getElementById('congregacao').value;
      var botao = document.querySelector('.btn-salvar');
      
      // Verifica se o irmão preencheu o título
      if (!titulo) {
        alert("Por favor, digite o nome do evento.");
        return;
      }
      
      // Muda o botão para mostrar que está carregando
      botao.innerText = "Enviando...";
      botao.disabled = true;

      // Pacote de dados que será enviado para o Google
      var dados = {
        titulo: titulo,
        data: data,
        congregacao: congregacao
      };

      // ATENÇÃO: COLE O SEU LINK DO APPS SCRIPT AQUI NOVAMENTE
      var googleAppsScriptUrl = 'https://script.google.com/macros/s/AKfycbxCop7u19B6jb_da89_VkxQtbqDp5jYXALtCD8RZ4M1dA1tummLfUjJDUOYiQ8CLW4vCw/exec';

      // Envia os dados para a planilha
      fetch(googleAppsScriptUrl, {
        method: 'POST',
        body: JSON.stringify(dados),
        // O text/plain evita bloqueios de segurança do navegador (CORS)
        headers: {
          'Content-Type': 'text/plain;charset=utf-8', 
        }
      })
      .then(response => {
        alert("Pedido enviado com sucesso! O evento ficará 'A Confirmar' até a aprovação do administrador.");
        fecharModal();
        // Recarrega a página para o novo evento aparecer no calendário
        location.reload(); 
      })
      .catch(error => {
        alert("Houve um erro ao enviar. Verifique a internet e tente novamente.");
        console.error(error);
        botao.innerText = "Enviar Pedido";
        botao.disabled = false;
      });
    }
  </script>
</head>
<body>

  <h2 style="text-align: center;">Agendamento do Salão do Reino</h2>
  
  <div id="calendar"></div>

  <div id="modal-reserva">
    <h3>Solicitar Horário</h3>
    <label>Data Escolhida:</label>
    <input type="text" id="data-escolhida" readonly>
    
    <label>Evento:</label>
    <input type="text" id="titulo-reserva" placeholder="Ex: Limpeza, Reunião Extra">
    
    <label>Congregação:</label>
    <select id="congregacao">
      <option value="Bela Vista">Bela Vista</option>
      <option value="Congregação 2">Congregação 2</option>
      <option value="Congregação 3">Congregação 3</option>
      <option value="Congregação 4">Congregação 4</option>
    </select>
    
    <button class="btn btn-salvar" onclick="enviarPedido()">Enviar Pedido</button>
    <button class="btn btn-fechar" onclick="fecharModal()">Cancelar</button>
  </div>

</body>
</html>
